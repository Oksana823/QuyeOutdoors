<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>山野笔记｜趣野</title><link rel="stylesheet" href="/css/theme.css"></head><body><div id="app" class="page" v-cloak><header class="topbar"><button class="icon-btn" onclick="history.back()">←</button><div class="eyebrow">FIELD NOTE</div><button class="icon-btn">↗</button></header><article v-if="note"><div class="image-list" style="padding:0;scroll-snap-type:x mandatory"><img v-for="src in images(note.images)" :src="image(src)" class="detail-cover" style="flex:0 0 100%;scroll-snap-align:start" @error="fallback"></div><section class="section"><div class="author"><img class="avatar" :src="avatar(note.icon)"><div><strong>{{note.name||'山野同路人'}}</strong><div class="section-sub">{{date(note.createTime)}}</div></div><button v-if="!isMine" class="ghost-btn" style="margin-left:auto;padding:8px 14px" @click="toggleFollow">{{followed?'已关注':'+ 关注'}}</button></div><h1 class="section-title" style="font-size:32px;margin-top:24px">{{note.title}}</h1><p style="white-space:pre-wrap;line-height:1.9">{{note.content}}</p><a v-if="place" class="place-card" style="width:100%;text-align:left" :href="'/place-detail.html?id='+place.id"><img :src="image(place.images)"><div><div class="eyebrow">TRIP LOCATION</div><h3>{{place.name}}</h3><div class="meta-line">{{place.address}}</div></div></a><div style="display:flex;align-items:center;margin-top:25px"><button class="primary-btn" @click="like">{{note.isLike?'♥ 已喜欢':'♡ 喜欢'}} · {{note.liked||0}}</button><div class="author" style="margin-left:auto"><img v-for="u in likes" class="avatar" :src="avatar(u.icon)" :title="u.nickName"></div></div></section></article><div v-else class="loading">正在读取这篇山野笔记…</div><div v-if="toast" class="toast">{{toast}}</div></div><script src="/js/vue.js"></script><script src="/js/axios.min.js"></script><script src="/js/api.js"></script><script>new Vue({el:'#app',data:{note:null,place:null,likes:[],me:null,followed:false,toast:''},computed:{isMine:function(){return this.me&&this.note&&this.me.id===this.note.userId}},created:function(){var self=this,id=Quye.query('id');API.note(id).then(function(n){self.note=n;API.place(n.placeId).then(function(p){self.place=p});API.noteLikes(id).then(function(v){self.likes=v||[]});if(sessionStorage.getItem('token')){API.me().then(function(u){self.me=u;if(u.id!==n.userId)API.followStatus(n.userId).then(function(v){self.followed=!!v})})}}).catch(function(e){Quye.error(self,e)})},methods:{images:Quye.images,image:Quye.image,avatar:Quye.avatar,fallback:function(e){e.target.src='/imgs/covers/forest.jpg'},date:function(v){return v?String(v).replace('T',' ').slice(0,16):''},like:function(){if(!Quye.requireLogin())return;var self=this;API.likeNote(this.note.id).then(function(){self.note.isLike=!self.note.isLike;self.note.liked+=(self.note.isLike?1:-1);return API.noteLikes(self.note.id)}).then(function(v){self.likes=v||[]}).catch(function(e){Quye.error(self,e)})},toggleFollow:function(){if(!Quye.requireLogin())return;var self=this;API.follow(this.note.userId,!this.followed).then(function(){self.followed=!self.followed}).catch(function(e){Quye.error(self,e)})}}})</script></body></html>
