<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>趣野｜去生活里撒点野</title><link rel="stylesheet" href="/css/element.css"><link rel="stylesheet" href="/css/theme.css"></head><body><div id="app" class="page" v-cloak><header class="topbar"><div class="brand"><span class="brand-mark">野</span>趣野</div><a class="icon-btn" href="/place-list.html">⌕</a></header><section class="hero"><div class="eyebrow">OUTSIDE IS CALLING</div><h1>去生活里<br>撒点野</h1><p>从城市出发，找到一片草地、一段山路，和真正好玩的户外体验。</p><a class="cta" href="/place-list.html">发现附近目的地 →</a></section><section class="section"><div class="section-head"><div><div class="eyebrow">CHOOSE YOUR WAY</div><h2 class="section-title">今天怎么玩</h2></div></div><div class="category-row"><button class="category" v-for="(c,i) in categories" :key="c.id" @click="openCategory(c)"><span class="symbol">{{symbols[i%symbols.length]}}</span>{{c.name}}</button></div></section><section class="section"><div class="section-head"><div><div class="eyebrow">FIELD NOTES</div><h2 class="section-title">山野新鲜事</h2></div><span class="section-sub">山友真实记录</span></div><div v-if="loading" class="loading">正在翻阅山野笔记…</div><div v-else class="note-grid"><article class="note-card" v-for="n in notes" :key="n.id" @click="openNote(n.id)"><img class="note-cover" :src="cover(n)" @error="fallback"><div class="note-body"><h3 class="note-title">{{n.title}}</h3><div class="note-meta"><img class="avatar" :src="avatar(n.icon)"><span>{{n.name||'山野同路人'}}</span><button class="like" :class="{active:n.isLike}" @click.stop="like(n)">♥ {{n.liked||0}}</button></div></div></article></div><div v-if="!loading&&!notes.length" class="empty">第一篇山野笔记，等你来写。</div></section><div v-if="toast" class="toast">{{toast}}</div></div><script src="/js/vue.js"></script><script src="/js/axios.min.js"></script><script src="/js/api.js"></script><script src="/js/navigation.js"></script><script>new Vue({el:'#app',data:{categories:[],notes:[],loading:true,toast:'',symbols:['△','♨','⌁','◌','✦','☼','≈','♧','⛰','✺']},created:function(){var self=this;Promise.all([API.categories(),API.hotNotes(1)]).then(function(r){self.categories=r[0]||[];self.notes=r[1]||[]}).catch(function(e){Quye.error(self,e)}).finally(function(){self.loading=false})},mounted:function(){var self=this;renderQuyeNav('home');window.addEventListener('pageshow',function(e){if(e.persisted)self.refreshNotes()})},methods:{cover:function(n){return Quye.image(n.images)},avatar:Quye.avatar,fallback:function(e){e.target.src='/imgs/covers/forest.jpg'},refreshNotes:function(){var self=this;API.hotNotes(1).then(function(v){self.notes=v||[]})},openCategory:function(c){location.href='/place-list.html?categoryId='+c.id+'&name='+encodeURIComponent(c.name)},openNote:function(id){location.href='/note-detail.html?id='+id},like:function(n){if(!Quye.requireLogin())return;var self=this;API.likeNote(n.id).then(function(){n.isLike=!n.isLike;n.liked=(n.liked||0)+(n.isLike?1:-1)}).catch(function(e){Quye.error(self,e)})}}})</script></body></html>
