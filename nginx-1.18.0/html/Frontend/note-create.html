<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>发布山野笔记｜趣野</title><link rel="stylesheet" href="/css/theme.css"></head><body><div id="app" class="page" v-cloak><header class="topbar"><button class="icon-btn" onclick="history.back()">×</button><div class="brand"><span class="brand-mark">写</span>记录此刻</div><button class="primary-btn" style="padding:8px 14px" :disabled="publishing||uploading>0" @click="publish">{{publishing?'发布中…':'发布'}}</button></header><main class="form-shell"><div class="eyebrow">NEW FIELD NOTE</div><h1 class="section-title" style="font-size:34px;margin-top:8px">把风景留下来</h1><div class="field"><label>照片（最多 9 张）</label><div class="image-list"><div v-for="(src,i) in uploads" style="position:relative"><img class="image-tile" :src="image(src)"><button class="icon-btn" style="position:absolute;right:0;top:0;color:white;background:#0008;border-radius:50%" @click="remove(i)">×</button></div><label class="upload-tile" v-if="uploads.length<9">＋<input type="file" accept="image/*" multiple hidden @change="upload"></label></div></div><div class="field"><label>标题</label><input v-model.trim="form.title" maxlength="64" placeholder="比如：雨后天目山轻徒步"></div><div class="field"><label>目的地</label><input v-model.trim="placeKeyword" @input="search" placeholder="搜索营地、山路或公园"><div v-if="placeOptions.length" style="background:var(--paper);border:1px solid var(--line);border-radius:14px;overflow:hidden"><button v-for="p in placeOptions" @click="selectPlace(p)" style="display:block;width:100%;border:0;background:white;padding:12px;text-align:left">{{p.name}} · {{p.area}}</button></div><div v-if="selectedPlace" class="tag" style="display:inline-block;margin-top:8px">已选择 {{selectedPlace.name}}</div></div><div class="field"><label>正文</label><textarea v-model.trim="form.content" rows="9" maxlength="2000" placeholder="路线、天气、装备、补给点……写下对下一位山友有用的细节。"></textarea></div><button class="primary-btn" style="width:100%" :disabled="publishing||uploading>0" @click="publish">{{publishing?'发布中…':(uploading>0?'图片上传中…':'发布到山野')}}</button></main><div v-if="toast" class="toast">{{toast}}</div></div><script src="/js/vue.js"></script><script src="/js/axios.min.js"></script><script src="/js/api.js"></script><script>new Vue({el:'#app',data:{form:{title:'',content:'',placeId:null,images:''},placeKeyword:'',placeOptions:[],selectedPlace:null,uploads:[],uploading:0,publishing:false,toast:'',timer:null},created:function(){Quye.requireLogin()},methods:{image:Quye.image,search:function(){var self=this;clearTimeout(this.timer);if(!this.placeKeyword){this.placeOptions=[];return}this.timer=setTimeout(function(){API.searchPlaces(self.placeKeyword).then(function(v){self.placeOptions=v||[]})},250)},selectPlace:function(p){this.selectedPlace=p;this.form.placeId=p.id;this.placeKeyword=p.name;this.placeOptions=[]},upload:function(e){var self=this,files=Array.prototype.slice.call(e.target.files).slice(0,9-this.uploads.length);if(!files.length)return;this.uploading+=files.length;files.forEach(function(file){var fd=new FormData();fd.append('file',file);API.upload(fd).then(function(path){self.uploads.push(path)}).catch(function(err){Quye.error(self,err)}).finally(function(){self.uploading--})});e.target.value=''},remove:function(i){var self=this,name=this.uploads[i];API.deleteUpload(name).catch(function(){}).finally(function(){self.uploads.splice(i,1)})},publish:function(){if(this.uploading>0){Quye.message(this,'图片仍在上传，请稍候');return}if(this.publishing)return;if(!this.form.title||!this.form.content||!this.form.placeId||!this.uploads.length){Quye.message(this,'请补全照片、标题、目的地和正文');return}var self=this,payload=Object.assign({},this.form,{images:this.uploads.join(',')});this.publishing=true;API.publish(payload).then(function(id){location.replace('/note-detail.html?id='+id)}).catch(function(e){Quye.error(self,e)}).finally(function(){self.publishing=false})}}})</script></body></html>
