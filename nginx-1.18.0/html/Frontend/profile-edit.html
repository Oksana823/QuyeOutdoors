<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>编辑户外档案｜趣野</title><link rel="stylesheet" href="/css/theme.css"></head><body><div id="app" class="page" v-cloak><header class="topbar"><button class="icon-btn" onclick="history.back()">←</button><div class="brand"><span class="brand-mark">档</span>户外档案</div><button class="primary-btn" style="padding:8px 14px" @click="save">保存</button></header><main class="form-shell"><div style="text-align:center"><img class="avatar" style="width:88px;height:88px" :src="avatar(user.icon)"><h2>{{user.nickName}}</h2></div><div class="field"><label>常驻城市</label><input v-model.trim="profile.city" placeholder="例如：杭州"></div><div class="field"><label>自我介绍</label><textarea v-model.trim="profile.introduce" maxlength="128" rows="4" placeholder="你的户外偏好、常走路线或一句出发宣言"></textarea></div><div class="field"><label>生日</label><input type="date" v-model="profile.birthday"></div><button class="primary-btn" style="width:100%" @click="save">保存户外档案</button></main><div v-if="toast" class="toast">{{toast}}</div></div><script src="/js/vue.js"></script><script src="/js/axios.min.js"></script><script src="/js/api.js"></script><script>new Vue({el:'#app',data:{user:{},profile:{},toast:''},created:function(){if(!Quye.requireLogin())return;var self=this;API.me().then(function(u){self.user=u;return API.profile(u.id)}).then(function(v){self.profile=v||{userId:self.user.id}}).catch(function(e){Quye.error(self,e)})},methods:{avatar:Quye.avatar,save:function(){var self=this;API.updateProfile(this.profile).then(function(){Quye.message(self,'户外档案已保存');setTimeout(function(){location.href='/profile.html'},700)}).catch(function(e){Quye.error(self,e)})}}})</script></body></html>
