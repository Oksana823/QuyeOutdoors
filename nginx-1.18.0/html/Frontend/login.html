<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>登录｜趣野</title><link rel="stylesheet" href="/css/theme.css"></head><body><div id="app" class="page auth" v-cloak><div class="brand"><span class="brand-mark" style="background:var(--sun);color:var(--forest)">野</span>趣野</div><main class="auth-card"><div class="eyebrow">WELCOME OUTSIDE</div><h1>山野见，朋友</h1><p class="section-sub">用手机号快速登录，继续收藏你的下一站。</p><div class="field"><label>手机号</label><input v-model.trim="form.phone" inputmode="tel" maxlength="11" placeholder="请输入 11 位手机号"></div><div class="field"><label>验证码</label><div class="code-row"><input v-model.trim="form.code" inputmode="numeric" maxlength="6" placeholder="6 位验证码"><button class="ghost-btn" :disabled="seconds>0" @click="send">{{seconds?seconds+'s':'获取验证码'}}</button></div></div><button class="primary-btn" style="width:100%" @click="login">进入趣野</button><a class="icon-btn" style="width:100%;font-size:14px;margin-top:16px" href="/password-login.html">使用密码登录 →</a></main><div v-if="toast" class="toast">{{toast}}</div></div><script src="/js/vue.js"></script><script src="/js/axios.min.js"></script><script src="/js/api.js"></script><script>new Vue({el:'#app',data:{form:{phone:'',code:''},seconds:0,toast:'',timer:null},methods:{send:function(){if(!/^1\d{10}$/.test(this.form.phone)){Quye.message(this,'请输入正确手机号');return}var self=this;API.sendCode(this.form.phone).then(function(){self.seconds=60;self.timer=setInterval(function(){if(--self.seconds<=0)clearInterval(self.timer)},1000);Quye.message(self,'验证码已发送')}).catch(function(e){Quye.error(self,e)})},login:function(){var self=this;API.login(this.form).then(function(token){sessionStorage.setItem('token',token);location.href=Quye.query('redirect')||'/'}).catch(function(e){Quye.error(self,e)})}}})</script></body></html>
