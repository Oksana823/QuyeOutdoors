<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>密码登录｜趣野</title><link rel="stylesheet" href="/css/theme.css"></head><body><div id="app" class="page auth" v-cloak><div class="brand"><span class="brand-mark" style="background:var(--sun);color:var(--forest)">野</span>趣野</div><main class="auth-card"><div class="eyebrow">BACK TO THE TRAIL</div><h1>欢迎归队</h1><p class="section-sub">演示账号：13800000001，密码：trail123</p><div class="field"><label>手机号</label><input v-model.trim="form.phone" inputmode="tel" maxlength="11" placeholder="请输入手机号"></div><div class="field"><label>密码</label><input v-model="form.password" type="password" placeholder="请输入密码" @keyup.enter="login"></div><button class="primary-btn" style="width:100%" @click="login">登录</button><a class="icon-btn" style="width:100%;font-size:14px;margin-top:16px" href="/login.html">验证码登录 →</a></main><div v-if="toast" class="toast">{{toast}}</div></div><script src="/js/vue.js"></script><script src="/js/axios.min.js"></script><script src="/js/api.js"></script><script>new Vue({el:'#app',data:{form:{phone:'',password:''},toast:''},methods:{login:function(){var self=this;API.login(this.form).then(function(token){sessionStorage.setItem('token',token);location.href=Quye.query('redirect')||'/'}).catch(function(e){Quye.error(self,e)})}}})</script></body></html>
