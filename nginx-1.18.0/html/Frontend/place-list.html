<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>目的地｜趣野</title><link rel="stylesheet" href="/css/theme.css"></head><body><div id="app" class="page" v-cloak><header class="topbar"><button class="icon-btn" onclick="history.back()">←</button><div class="brand"><span class="brand-mark">野</span>目的地</div><span></span></header><section class="section"><div class="eyebrow">DESTINATION INDEX</div><h1 class="section-title">{{activeName||'寻找下一站'}}</h1><p class="section-sub">按兴趣找营地、山路、水岸和城市户外空间</p><div class="category-row" style="margin-top:18px"><button v-for="(c,i) in categories" class="category" :class="{active:c.id==categoryId}" @click="choose(c)"><span class="symbol">{{symbols[i%symbols.length]}}</span>{{c.name}}</button></div></section><section class="section"><article class="place-card" v-for="p in places" @click="open(p.id)"><img :src="image(p.images)" @error="fallback"><div><div class="eyebrow">{{p.area||'城市近郊'}}</div><h3>{{p.name}}</h3><div class="tags"><span class="tag">评分 {{score(p.score)}}</span><span class="tag" v-if="p.distance">{{distance(p.distance)}}</span></div><div class="meta-line">{{p.address}}</div><div class="meta-line">人均 ¥{{p.avgPrice||0}} · {{p.openHours}}</div></div></article><div v-if="loading" class="loading">正在定位好去处…</div><div v-if="!loading&&!places.length" class="empty">这一类目的地还在勘探中。</div><button v-if="places.length>=10" class="ghost-btn" style="width:100%" @click="more">再看一些</button></section><div v-if="toast" class="toast">{{toast}}</div></div><script src="/js/vue.js"></script><script src="/js/axios.min.js"></script><script src="/js/api.js"></script><script src="/js/navigation.js"></script><script>new Vue({el:'#app',data:{categories:[],places:[],categoryId:Number(Quye.query('categoryId'))||1,activeName:Quye.query('name'),current:1,loading:false,toast:'',symbols:['△','♨','⌁','◌','✦','☼','≈','♧','⛰','✺']},created:function(){var self=this;API.categories().then(function(v){self.categories=v||[];var c=self.categories.find(function(x){return x.id==self.categoryId});if(c&&!self.activeName)self.activeName=c.name;self.load(false)}).catch(function(e){Quye.error(self,e)})},mounted:function(){renderQuyeNav('places')},methods:{load:function(append){var self=this;self.loading=true;var params={categoryId:self.categoryId,current:self.current};self.fetch(params,append)},fetch:function(params,append){var self=this;API.places(params).then(function(v){self.places=append?self.places.concat(v||[]):(v||[])}).catch(function(e){Quye.error(self,e)}).finally(function(){self.loading=false})},choose:function(c){this.categoryId=c.id;this.activeName=c.name;this.current=1;this.load(false)},more:function(){this.current++;this.load(true)},open:function(id){location.href='/place-detail.html?id='+id},image:Quye.image,fallback:function(e){e.target.src='/imgs/covers/forest.jpg'},score:function(v){return v?(v/10).toFixed(1):'4.8'},distance:function(v){return v<1000?Math.round(v)+'m':(v/1000).toFixed(1)+'km'}}})</script></body></html>
