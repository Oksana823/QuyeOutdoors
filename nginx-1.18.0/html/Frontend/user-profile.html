<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>山友主页｜趣野</title><link rel="stylesheet" href="/css/theme.css"></head><body><div id="app" class="page" v-cloak><header class="topbar" style="background:var(--forest);color:white;border:0"><button class="icon-btn" style="color:white" onclick="history.back()">←</button><div class="eyebrow" style="color:white">TRAIL MATE</div><span></span></header><section v-if="user" class="profile-hero"><div class="profile-main"><img class="avatar" :src="avatar(user.icon)"><div><h2 style="margin:0 0 5px">{{user.nickName}}</h2><div style="opacity:.7">{{profile.city||'远方'}} · {{profile.introduce||'愿每次出发都有回声'}}</div></div><button class="primary-btn" style="margin-left:auto" @click="toggleFollow">{{followed?'已关注':'+ 关注'}}</button></div><div class="profile-stats"><div><strong>{{profile.followee||0}}</strong><span>关注</span></div><div><strong>{{profile.fans||0}}</strong><span>山友</span></div><div><strong>{{notes.length}}</strong><span>笔记</span></div></div></section><section class="section"><div class="section-head"><h2 class="section-title">同行山友</h2><span class="section-sub">共同关注</span></div><div class="author" v-if="commons.length"><a v-for="u in commons" class="icon-btn" :href="'/user-profile.html?id='+u.id"><img class="avatar" :src="avatar(u.icon)" :title="u.nickName"></a></div><div v-else class="section-sub">暂时没有共同关注</div></section><section class="section"><div class="section-head"><h2 class="section-title">TA 的山野</h2></div><div class="note-grid"><a class="note-card" v-for="n in notes" :href="'/note-detail.html?id='+n.id"><img class="note-cover" :src="image(n.images)" @error="fallback"><div class="note-body"><h3 class="note-title">{{n.title}}</h3><div class="note-meta">♥ {{n.liked||0}}</div></div></a></div><div v-if="!notes.length" class="empty">TA 还没写下第一篇山野笔记。</div></section><div v-if="toast" class="toast">{{toast}}</div></div><script src="/js/vue.js"></script><script src="/js/axios.min.js"></script><script src="/js/api.js"></script><script>new Vue({el:'#app',data:{id:Quye.query('id'),user:null,profile:{},notes:[],commons:[],followed:false,toast:''},created:function(){var self=this;Promise.all([API.user(this.id),API.profile(this.id),API.userNotes(this.id,1)]).then(function(r){self.user=r[0];self.profile=r[1]||{};self.notes=r[2]||[]});if(sessionStorage.getItem('token')){API.followStatus(this.id).then(function(v){self.followed=!!v});API.commonFollows(this.id).then(function(v){self.commons=v||[]})}},methods:{image:Quye.image,avatar:Quye.avatar,fallback:function(e){e.target.src='/imgs/covers/forest.jpg'},toggleFollow:function(){if(!Quye.requireLogin())return;var self=this;API.follow(this.id,!this.followed).then(function(){self.followed=!self.followed}).catch(function(e){Quye.error(self,e)})}}})</script></body></html>
